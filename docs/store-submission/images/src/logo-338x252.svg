<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="338" height="252" viewBox="0 0 338 252">
  <!-- uniple Checkout - 公式ストア提出用 338x252 ロゴ -->
  <!-- 白背景 + JPYC Blue accent -->
  <rect width="338" height="252" fill="#FFFFFF"/>

  <!-- 左上: JPYC Blue 円 + 白チェック (= 完了画面と同モチーフ) -->
  <circle cx="80" cy="100" r="50" fill="#16449A"/>
  <path d="M 60 100 L 75 115 L 100 85"
        stroke="#FFFFFF" stroke-width="8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 右側: テキスト「JPYC Checkout」 -->
  <text x="155" y="95" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#16449A">JPYC</text>
  <text x="155" y="130" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="500" fill="#16449A">Checkout</text>

  <!-- 下: by uniple -->
  <text x="155" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="16" font-weight="400" fill="#666666">powered by uniple</text>

  <!-- 下端: 法令分類 caption -->
  <text x="169" y="220" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif"
        font-size="12" font-weight="400" fill="#999999" text-anchor="middle">日本円ステーブルコイン (電子決済手段) 決済</text>
</svg>
